<div class="card-container prod-card back" id="cardContainer">
  <div class="hsk-badge">{{HSK_Level}}</div>
  <div class="type-indicator prod-type">🟢 PRODUCTION</div>

  <div class="comparison-title">
    Trace over the guide to compare
  </div>

  <!-- Unified container: canvas with integrated HanziWriter -->
  <div class="canvas-grid-container" id="canvasGridContainer"></div>

  <!-- Controls -->
  <div class="canvas-controls">
    <button onclick="clearAllCanvas()" class="btn-clear">
      🗑️ Clear
    </button>
    <button onclick="undoLastStroke()" class="btn-undo">
      ↶ Undo
    </button>
    <button onclick="replayStrokeOrder()" class="btn-replay">
      🔄 Replay
    </button>
  </div>

  <div class="correct-answer-section compact">
    <div class="correct-label">✅ Correct answer</div>
    <div class="chinese-answer compact">{{Simplified}}</div>
    <div class="pinyin-answer">{{Pinyin}}</div>
  </div>

  <div class="meaning-reminder">
    📖 {{Meaning}}
  </div>

  <div class="auto-audio" style="display:none;">{{Audio}}</div>

  <div class="examples-section compact">
    <div class="examples-title">📚 Examples</div>
    <div class="examples-content">
      {{Examples}}
    </div>
  </div>

  <div class="card-footer">
    <div class="tags">{{Tags}}</div>
    <div class="progress-bar">
      <div class="progress-fill"></div>
    </div>
    <div class="motivation-text">💪 Practice your strokes!</div>
  </div>
</div>

<script>
(function() {
  var simplified = '{{Simplified}}';
  var chars = simplified.split('');
  var charCount = chars.length;
  var tags = '{{Tags}}'.toLowerCase();

  var isGrammar = tags.includes('particle') ||
                  tags.includes('grammar') ||
                  tags.includes('conjunction') ||
                  tags.includes('measure');

  var card = document.getElementById('cardContainer');
  if (isGrammar) {
    card.classList.add('grammar-card');
  } else {
    card.classList.add('vocab-card');
  }

  var container = document.getElementById('canvasGridContainer');

  var canvasSize, gridClass;
  if (charCount === 1) {
    canvasSize = 300; gridClass = 'canvas-grid-1';
  } else if (charCount === 2) {
    canvasSize = 150; gridClass = 'canvas-grid-2';
  } else if (charCount === 3) {
    canvasSize = 100; gridClass = 'canvas-grid-3';
  } else {
    canvasSize = 150; gridClass = 'canvas-grid-4';
  }

  container.classList.add(gridClass);

  function isCJK(ch) {
    var code = ch.charCodeAt(0);
    return (code >= 0x4E00 && code <= 0x9FFF) ||
           (code >= 0x3400 && code <= 0x4DBF) ||
           (code >= 0x20000 && code <= 0x2A6DF);
  }

  window.canvasManagers = [];
  window.hanziWriters = [];
  var writerTargets = [];

  chars.forEach(function(char, index) {
    if (!isCJK(char)) return;

    var wrapper = document.createElement('div');
    wrapper.className = 'canvas-item';

    // HanziWriter zone (replaces char-guide)
    var hanziDiv = document.createElement('div');
    hanziDiv.className = 'hanzi-guide';
    hanziDiv.id = 'hanzi-guide-' + index;

    // Drawing canvas on top
    var canvas = document.createElement('canvas');
    canvas.id = 'canvas-back-' + index;
    canvas.width = canvasSize * 2;
    canvas.height = canvasSize * 2;
    canvas.style.width = canvasSize + 'px';
    canvas.style.height = canvasSize + 'px';

    // Grid
    var grid = document.createElement('div');
    grid.className = 'canvas-grid';

    wrapper.appendChild(hanziDiv);
    wrapper.appendChild(canvas);
    wrapper.appendChild(grid);
    container.appendChild(wrapper);

    writerTargets.push({ id: hanziDiv.id, char: char, size: canvasSize });

    var manager = initCanvasManager(canvas);
    window.canvasManagers.push(manager);
  });

  function initCanvasManager(canvas) {
    var ctx = canvas.getContext('2d');
    var isDrawing = false;
    var strokes = [];
    var currentStroke = [];

    ctx.strokeStyle = '#2c3e50';
    ctx.lineWidth = 10;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    function getPos(e) {
      var rect = canvas.getBoundingClientRect();
      var scaleX = canvas.width / rect.width;
      var scaleY = canvas.height / rect.height;
      var clientX, clientY;
      if (e.touches && e.touches.length > 0) {
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY;
      } else {
        clientX = e.clientX;
        clientY = e.clientY;
      }
      return {
        x: (clientX - rect.left) * scaleX,
        y: (clientY - rect.top) * scaleY
      };
    }

    function startDrawing(e) {
      e.preventDefault(); e.stopPropagation();
      isDrawing = true;
      currentStroke = [];
      var pos = getPos(e);
      currentStroke.push(pos);
      ctx.beginPath();
      ctx.moveTo(pos.x, pos.y);
    }

    function draw(e) {
      if (!isDrawing) return;
      e.preventDefault(); e.stopPropagation();
      var pos = getPos(e);
      currentStroke.push(pos);
      ctx.lineTo(pos.x, pos.y);
      ctx.stroke();
    }

    function stopDrawing(e) {
      if (!isDrawing) return;
      e.preventDefault(); e.stopPropagation();
      isDrawing = false;
      if (currentStroke.length > 0) {
        strokes.push(currentStroke.slice());
      }
    }

    canvas.addEventListener('mousedown', startDrawing);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', stopDrawing);
    canvas.addEventListener('mouseout', stopDrawing);
    canvas.addEventListener('click', function(e) { e.preventDefault(); e.stopPropagation(); });
    canvas.addEventListener('touchstart', startDrawing, {passive: false});
    canvas.addEventListener('touchmove', draw, {passive: false});
    canvas.addEventListener('touchend', stopDrawing, {passive: false});
    canvas.addEventListener('touchcancel', stopDrawing, {passive: false});

    return {
      canvas: canvas, ctx: ctx,
      clear: function() { ctx.clearRect(0, 0, canvas.width, canvas.height); strokes = []; },
      undo: function() {
        if (strokes.length === 0) return;
        strokes.pop();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        strokes.forEach(function(stroke) {
          if (stroke.length === 0) return;
          ctx.beginPath();
          ctx.moveTo(stroke[0].x, stroke[0].y);
          stroke.forEach(function(point) { ctx.lineTo(point.x, point.y); });
          ctx.stroke();
        });
      }
    };
  }

  window.clearAllCanvas = function() {
    window.canvasManagers.forEach(function(m) { m.clear(); });
  };

  window.undoLastStroke = function() {
    window.canvasManagers.forEach(function(m) { m.undo(); });
  };

  // HanziWriter directly in each box
  function loadHanziWriter(callback) {
    if (window.HanziWriter) { callback(); return; }
    var s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js';
    s.onload = callback;
    document.head.appendChild(s);
  }

  function initStrokeOrder() {
    loadHanziWriter(function() {
      writerTargets.forEach(function(t) {
        var writer = HanziWriter.create(t.id, t.char, {
          width: t.size,
          height: t.size,
          padding: 10,
          showOutline: true,
          showCharacter: false,
          strokeAnimationSpeed: 1,
          delayBetweenStrokes: 300,
          strokeColor: '#b0b0b0',
          outlineColor: '#e0e0e0',
          drawingColor: '#c0392b'
        });
        window.hanziWriters.push(writer);
      });
      animateSequentially(0);
    });
  }

  function animateSequentially(index) {
    if (index >= window.hanziWriters.length) return;
    window.hanziWriters[index].animateCharacter({
      onComplete: function() { animateSequentially(index + 1); }
    });
  }

  window.replayStrokeOrder = function() {
    window.hanziWriters.forEach(function(w) { w.hideCharacter(); });
    animateSequentially(0);
  };

  initStrokeOrder();
})();
</script>
