<div class="card-container prod-card" id="cardContainer">
  <div class="hsk-badge">{{HSK_Level}}</div>
  <div class="type-indicator prod-type">🟢 PRODUCTION</div>

  <div class="meaning-question">
    {{Meaning}}
  </div>

  <div class="question-prompt">
    ✍️ Write each character in its box
  </div>

  <!-- Container for multiple canvases -->
  <div class="canvas-grid-container" id="canvasGridContainer"></div>

  <!-- Controls -->
  <div class="canvas-controls">
    <button onclick="clearAllCanvas()" class="btn-clear">
      🗑️ Clear all
    </button>
    <button onclick="undoLastCanvas()" class="btn-undo">
      ↶ Undo last
    </button>
  </div>

  <div class="hint-section">
    <div class="hint-label">💡 Pronunciation:</div>
    <div class="hint-content">{{Pinyin}}</div>
  </div>

  <div class="auto-audio" style="display:none;">{{Audio}}</div>

  <div class="card-footer">
    <div class="tags">{{Tags}}</div>
    <div class="motivation-text">✍️ One character per box!</div>
  </div>
</div>

<script>
(function() {
  const simplified = '{{Simplified}}';
  const chars = simplified.split('');
  const charCount = chars.length;
  const tags = '{{Tags}}'.toLowerCase();

  // Detect type
  const isGrammar = tags.includes('particle') ||
                    tags.includes('grammar') ||
                    tags.includes('conjunction') ||
                    tags.includes('measure');

  const card = document.getElementById('cardContainer');
  if (isGrammar) {
    card.classList.add('grammar-card');
  } else {
    card.classList.add('vocab-card');
  }

  // Main container
  const container = document.getElementById('canvasGridContainer');

  // Determine size based on character count
  let canvasSize, gridClass;
  if (charCount === 1) {
    canvasSize = 300;
    gridClass = 'canvas-grid-1';
  } else if (charCount === 2) {
    canvasSize = 150;
    gridClass = 'canvas-grid-2';
  } else if (charCount === 3) {
    canvasSize = 100;
    gridClass = 'canvas-grid-3';
  } else {
    canvasSize = 150;
    gridClass = 'canvas-grid-4';
  }

  container.classList.add(gridClass);

  // Test if a character is CJK (Chinese) — excludes digits, letters, punctuation
  function isCJK(ch) {
    var code = ch.charCodeAt(0);
    return (code >= 0x4E00 && code <= 0x9FFF) ||
           (code >= 0x3400 && code <= 0x4DBF) ||
           (code >= 0x20000 && code <= 0x2A6DF);
  }

  // Array to store managers
  window.canvasManagers = [];

  // Create a canvas for each character
  chars.forEach((char, index) => {
    if (!isCJK(char)) return;

    // Wrapper
    const wrapper = document.createElement('div');
    wrapper.className = 'canvas-item';

    // Canvas
    const canvas = document.createElement('canvas');
    canvas.id = `canvas-${index}`;
    canvas.width = canvasSize * 2;  // High resolution
    canvas.height = canvasSize * 2;
    canvas.style.width = `${canvasSize}px`;
    canvas.style.height = `${canvasSize}px`;

    // Grid
    const grid = document.createElement('div');
    grid.className = 'canvas-grid';

    wrapper.appendChild(canvas);
    wrapper.appendChild(grid);
    container.appendChild(wrapper);

    // Initialize drawing
    const manager = initCanvasManager(canvas);
    window.canvasManagers.push(manager);
  });

  // Function to initialize a canvas
  function initCanvasManager(canvas) {
    const ctx = canvas.getContext('2d');
    let isDrawing = false;
    let strokes = [];
    let currentStroke = [];

    // Configuration
    ctx.strokeStyle = '#2c3e50';
    ctx.lineWidth = 10;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    function getPos(e) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;

      let clientX, clientY;
      if (e.touches && e.touches.length > 0) {
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY;
      } else {
        clientX = e.clientX;
        clientY = e.clientY;
      }

      return {
        x: (clientX - rect.left) * scaleX,
        y: (clientY - rect.top) * scaleY
      };
    }

    function startDrawing(e) {
      e.preventDefault();
      e.stopPropagation();
      isDrawing = true;
      currentStroke = [];
      const pos = getPos(e);
      currentStroke.push(pos);
      ctx.beginPath();
      ctx.moveTo(pos.x, pos.y);
    }

    function draw(e) {
      if (!isDrawing) return;
      e.preventDefault();
      e.stopPropagation();
      const pos = getPos(e);
      currentStroke.push(pos);
      ctx.lineTo(pos.x, pos.y);
      ctx.stroke();
    }

    function stopDrawing(e) {
      if (!isDrawing) return;
      e.preventDefault();
      e.stopPropagation();
      isDrawing = false;
      if (currentStroke.length > 0) {
        strokes.push([...currentStroke]);
      }
    }

    // Mouse events
    canvas.addEventListener('mousedown', startDrawing);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', stopDrawing);
    canvas.addEventListener('mouseout', stopDrawing);
    canvas.addEventListener('click', (e) => {
      e.preventDefault();
      e.stopPropagation();
    });

    // Touch events
    canvas.addEventListener('touchstart', startDrawing, {passive: false});
    canvas.addEventListener('touchmove', draw, {passive: false});
    canvas.addEventListener('touchend', stopDrawing, {passive: false});
    canvas.addEventListener('touchcancel', stopDrawing, {passive: false});

    return {
      canvas,
      ctx,
      clear: function() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        strokes = [];
      },
      undo: function() {
        if (strokes.length === 0) return;
        strokes.pop();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        strokes.forEach(stroke => {
          if (stroke.length === 0) return;
          ctx.beginPath();
          ctx.moveTo(stroke[0].x, stroke[0].y);
          stroke.forEach(point => ctx.lineTo(point.x, point.y));
          ctx.stroke();
        });
      }
    };
  }

  // Global functions
  window.clearAllCanvas = function() {
    window.canvasManagers.forEach(m => m.clear());
  };

  window.undoLastCanvas = function() {
    const lastManager = window.canvasManagers[window.canvasManagers.length - 1];
    if (lastManager) lastManager.undo();
  };
})();
</script>
